<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Weekly Compliance Summary</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f6f9; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 30px auto; background: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .header { background: linear-gradient(135deg, #1565c0, #0d47a1); color: #fff; padding: 24px 30px; }
        .header h1 { margin: 0; font-size: 22px; }
        .header p { margin: 6px 0 0; opacity: 0.85; font-size: 14px; }
        .body { padding: 30px; color: #333; line-height: 1.6; }
        .stat-grid { display: flex; gap: 16px; margin: 20px 0; }
        .stat-card { flex: 1; background: #f5f7fa; border-radius: 8px; padding: 16px; text-align: center; }
        .stat-card .value { font-size: 28px; font-weight: 700; color: #1565c0; }
        .stat-card .label { font-size: 12px; color: #777; margin-top: 4px; }
        .status-table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        .status-table th { background: #f5f7fa; padding: 10px 14px; text-align: left; font-size: 13px; color: #555; border-bottom: 2px solid #e0e0e0; }
        .status-table td { padding: 10px 14px; border-bottom: 1px solid #eee; }
        .status-table td:last-child { font-weight: 600; text-align: right; }
        .footer { padding: 16px 30px; background: #f9f9f9; color: #999; font-size: 12px; text-align: center; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📊 Weekly Compliance Summary</h1>
        <p th:text="'Report generated on ' + ${reportDate}">Report generated on 2026-04-28</p>
    </div>
    <div class="body">
        <!-- Summary stats -->
        <div class="stat-grid">
            <div class="stat-card">
                <div class="value" th:text="${totalRecords}">42</div>
                <div class="label">Total Records</div>
            </div>
            <div class="stat-card">
                <div class="value" th:text="${averageScore} + '%'">72.50%</div>
                <div class="label">Avg. Score</div>
            </div>
            <div class="stat-card">
                <div class="value" th:text="${overdueCount}">5</div>
                <div class="label">Overdue</div>
            </div>
        </div>

        <!-- Status breakdown -->
        <h3 style="margin-bottom: 8px;">Status Breakdown</h3>
        <table class="status-table">
            <thead>
            <tr>
                <th>Status</th>
                <th style="text-align: right;">Count</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="entry : ${countByStatus}">
                <td th:text="${entry.key}">COMPLIANT</td>
                <td th:text="${entry.value}">12</td>
            </tr>
            </tbody>
        </table>

        <p>Review the dashboard for full details and take action on outstanding items.</p>
    </div>
    <div class="footer">
        PCI-DSS Compliance Tracker — Automated Weekly Report
    </div>
</div>
</body>
</html>
