# ============================================================================
# PCI-DSS Compliance Tracker — Application Configuration
# ============================================================================

server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: pci-dss-compliance-tracker

  # PostgreSQL Database
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:pci_dss_db}
    username: postgres
    password: ${DB_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Flyway
  flyway:
    enabled: false
    locations: classpath:db/migration

  # Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  # Mail
  mail:
    host: smtp.gmail.com
    port: 587
    username: jonnalagaddadevunidayas7@gmail.com
    password: fupwtahtnsvhkeqh

    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# JWT Configuration
jwt:
  secret: mysecretkeymysecretkeymysecretkey12
  expiration: 86400000

# AI Service
ai-service:
  base-url: http://localhost:5000