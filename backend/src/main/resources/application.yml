# ============================================================================
# PCI-DSS Compliance Tracker — Application Configuration
# All sensitive values injected via environment variables.
# ============================================================================

spring:
  profiles:
    active: ${SPRING_PROFILE:prod}

  application:
    name: pci-dss-compliance-tracker

  # PostgreSQL Database
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:pci_dss_db}
    username: postgres
    password: ${DB_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:20}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      connection-timeout: 30000

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        # Batch inserts/updates to reduce round-trips (Day 14)
        jdbc.batch_size: 25
        order_inserts: true
        order_updates: true

  # Flyway
  # baseline-on-migrate: treats existing schema as v0 instead of failing.
  # clean-disabled=true prevents accidental data loss in prod.
  flyway:
    enabled: false
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    clean-disabled: true
    out-of-order: true
    validate-on-migrate: true
    mixed: true   # required for CREATE INDEX CONCURRENTLY in V4

  # Redis
  # BUG-2 FIX: connection/command timeouts + Lettuce pool for resilience.
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      connect-timeout: 5000
      timeout: 3000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: 2000ms

  # Mail (for notifications)
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# JWT Configuration
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}
  expiry-seconds: ${JWT_EXPIRY_SECONDS:3600}
  refresh-expiry-seconds: ${JWT_REFRESH_EXPIRY_SECONDS:604800}

# AI Service
ai-service:
  base-url: ${AI_SERVICE_URL:http://localhost:5000}

# Scheduler Configuration
scheduler:
  admin-email: ${SCHEDULER_ADMIN_EMAIL:admin@pcidss-demo.com}
  cron:
    overdue-reminder: ${SCHEDULER_CRON_OVERDUE:0 0 8 * * ?}
    deadline-alert: ${SCHEDULER_CRON_DEADLINE:0 0 9 * * ?}
    weekly-summary: ${SCHEDULER_CRON_WEEKLY:0 0 7 ? * MON}

# Spring Actuator — expose health and info only; details require authentication
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

server:
  port: ${SERVER_PORT:8080}

