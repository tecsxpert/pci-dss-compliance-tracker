# ============================================================================
# PCI-DSS Compliance Tracker — Application Configuration
# All sensitive values should be injected via environment variables.
# Safe defaults are provided so the app can at least START without a .env file.
# ============================================================================

server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: pci-dss-compliance-tracker

  # PostgreSQL Database
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:pci_dss_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration

  # Redis (optional — auto-config is excluded if not available)
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  # Mail (for notifications)
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:noreply@pcidss-demo.com}
    password: ${MAIL_PASSWORD:changeme}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # Disable Redis auto-config if Redis is not available
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:pci-dss-tracker-dev-secret-key-must-be-at-least-256-bits-long-for-hmac-sha}
  expiration: ${JWT_EXPIRATION:86400000}
  expiry-seconds: ${JWT_EXPIRY_SECONDS:3600}
  refresh-expiry-seconds: ${JWT_REFRESH_EXPIRY_SECONDS:604800}

# AI Service
ai-service:
  base-url: ${AI_SERVICE_URL:http://localhost:5000}

# Scheduler Configuration
scheduler:
  admin-email: ${SCHEDULER_ADMIN_EMAIL:admin@pcidss-demo.com}
  cron:
    overdue-reminder: ${SCHEDULER_CRON_OVERDUE:0 0 8 * * ?}
    deadline-alert: ${SCHEDULER_CRON_DEADLINE:0 0 9 * * ?}
    weekly-summary: ${SCHEDULER_CRON_WEEKLY:0 0 7 ? * MON}
