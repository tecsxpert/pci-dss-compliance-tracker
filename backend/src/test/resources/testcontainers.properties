# Testcontainers configuration for Docker Desktop on Windows with WSL2
# docker_engine_linux is the only named pipe that returns a valid Docker API
# ServerVersion response. The other pipes (docker_engine, dockerDesktopLinuxEngine)
# return an empty 400 proxy response that Testcontainers rejects.
docker.client.strategy=org.testcontainers.dockerclient.NpipeSocketClientProviderStrategy
