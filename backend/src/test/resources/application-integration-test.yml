# =============================================================================
# Integration-Test Profile Configuration
# Active only when @ActiveProfiles("integration-test") is set.
# Real PostgreSQL and Redis are supplied by Testcontainers — the datasource
# URL and Redis connection are overridden at runtime via @DynamicPropertySource.
# =============================================================================

server:
  port: 0

spring:
  application:
    name: pci-dss-compliance-tracker-integration-test

  # Datasource — values will be replaced at runtime by @DynamicPropertySource
  datasource:
    url: jdbc:postgresql://localhost:5432/pci_dss_test
    username: test
    password: test
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway owns the schema; JPA only validates
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  # Flyway — runs real migrations on the Testcontainers PostgreSQL instance
  flyway:
    enabled: true
    locations: classpath:db/migration

  # Redis — values will be replaced at runtime by @DynamicPropertySource
  data:
    redis:
      host: localhost
      port: 6379
      password:

  # Disable mail to avoid SMTP connection attempts during tests
  mail:
    host: localhost
    port: 25
    username: noop
    password: noop

  # Keep Redis auto-configuration active (real Redis container is available)
  autoconfigure:
    exclude: []

# JWT — fixed secret makes token generation deterministic across test runs
jwt:
  secret: IntegrationTestSecretKeyThatIsAtLeast256BitsLongForHMACSHA256Algorithm!!
  expiration: 86400000
  expiry-seconds: 3600
  refresh-expiry-seconds: 604800

# AI service is not needed for integration tests
ai-service:
  base-url: http://localhost:5000

# Disable all scheduled jobs during integration tests to avoid noise
scheduler:
  admin-email: it-test@pcidss.test
  cron:
    overdue-reminder: "-"
    deadline-alert: "-"
    weekly-summary: "-"

# Disable Spring scheduling in integration tests
spring.task.scheduling.enabled: false
